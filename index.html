        <select class="cat-select" id="input-fixed-cat">${catOpts}</select></div>
      <button type="submit" id="btn-save-fixed">+ Agregar gasto fijo</button>
    </form>
    <div class="info-note">${note}</div>
    ${list}`;
  }

  // ── Historial — resumen mensual sin navegación ────────────────────
  function renderHistorial() {
    // Months detected ONLY from movements (not savings)
    const monthSet = new Set();
    state.movements.forEach(m=>monthSet.add(m.date.slice(0,7)));
    const months = Array.from(monthSet).sort().reverse();

    const inc = totalIncome();
    let html  = '';

    if(!months.length) {
      html = `<div class="empty-state"><p>Aún no hay historial.<br>Los meses con movimientos aparecerán aquí.</p></div>`;
    } else {
      // Group by year (Change 4)
      const byYear = {};
      months.forEach(mk => {
        const yr = mk.slice(0,4);
        if(!byYear[yr]) byYear[yr] = [];
        byYear[yr].push(mk);
      });

      Object.keys(byYear).sort().reverse().forEach(yr => {
        html += `<div style="font-size:.72rem;font-weight:800;color:var(--text-2);text-transform:uppercase;letter-spacing:.1em;padding:8px 0 4px">${yr}</div>`;

        byYear[yr].forEach(mk => {
          // Use snapshot for fixed expenses of that month (Change 2)
          const fixedSnap = state.fixedSnapshots[mk] || [];
          const ft = fixedSnap.reduce((s,f)=>s+f.amount, 0);

          const movs  = state.movements.filter(m=>m.date.startsWith(mk));
          const movT  = movs.reduce((s,m)=>s+m.amount,0);
          const total = movT + ft;
          const saldo = inc ? inc - total : null;

          const itemRows = movs.map(m=>{
            const c = catStyle(m.category);
            if(_editingMovement===m.id) {
              const curMonth = m.date ? m.date.slice(0,7) : todayMk();
              const inp = `border:1.5px solid var(--border);border-radius:8px;padding:8px 10px;font-size:.85rem;font-family:inherit;color:var(--text);background:var(--bg);width:100%;outline:none`;
              return `<div style="padding:10px;margin:4px 0;background:var(--bg);border-radius:10px;border:1.5px solid var(--brand);display:flex;flex-direction:column;gap:8px">
                <div>
                  <div style="font-size:.65rem;font-weight:700;color:var(--text-2);text-transform:uppercase;letter-spacing:.05em;margin-bottom:4px">Nombre</div>
                  <input id="edit-name-${m.id}" value="${esc(m.item)}" maxlength="60" autocorrect="off" style="${inp}"/>
                </div>
                <div style="display:grid;grid-template-columns:1fr 1fr;gap:8px">
                  <div>
                    <div style="font-size:.65rem;font-weight:700;color:var(--text-2);text-transform:uppercase;letter-spacing:.05em;margin-bottom:4px">Monto</div>
                    <input id="edit-amt-${m.id}" type="number" value="${m.amount}" min="1" inputmode="numeric" style="${inp}"/>
                  </div>
                  <div>
                    <div style="font-size:.65rem;font-weight:700;color:var(--text-2);text-transform:uppercase;letter-spacing:.05em;margin-bottom:4px">Mes</div>
                    <input id="edit-month-${m.id}" type="month" value="${curMonth}" style="${inp}"/>
                  </div>
                </div>
                <div style="display:flex;gap:8px;justify-content:flex-end;padding-top:2px">
                  <button onclick="App.cancelEditMovement()" style="padding:7px 14px;background:none;color:var(--text-2);border:1.5px solid var(--border);border-radius:8px;font-size:.78rem;font-weight:700;cursor:pointer;font-family:inherit">Cancelar</button>
                  <button onclick="App.saveEditMovement('${m.id}')" style="padding:7px 18px;background:var(--brand);color:#fff;border:none;border-radius:8px;font-size:.78rem;font-weight:700;cursor:pointer;font-family:inherit">Guardar</button>
                </div>
              </div>`;
            }
            return `<div style="display:flex;align-items:center;gap:6px;padding:5px 0;border-bottom:1px solid var(--border)">
              <div style="flex:1;min-width:0">
                <span style="font-size:.82rem;font-weight:600">${esc(m.item)}</span>
                <span class="cat-badge" style="background:${c.bg};color:${c.color};margin-left:6px">${c.label}</span>
              </div>
              <span style="font-size:.82rem;font-weight:700;white-space:nowrap">${disp(m.amount)}</span>
              <button class="btn-action edit" onclick="App.editMovement('${m.id}')" title="Editar">${SVG.pencil}</button>
              <button class="btn-action del" onclick="App.deleteMovement('${m.id}')" title="Eliminar">${SVG.close}</button>
            </div>`;
          }).join('');

          html += `<div class="balance-card" style="gap:0">
            <div style="display:flex;justify-content:space-between;align-items:baseline;margin-bottom:10px">
              <p style="font-size:.85rem;font-weight:800;color:var(--text);text-transform:capitalize">${fmtMonthLabel(mk)}</p>
              ${saldo!==null?`<span style="font-size:.72rem;color:var(--text-2)">Saldo: <strong style="color:${saldo>=0?'var(--success)':'var(--danger)'}">${disp(saldo)}</strong></span>`:''}
            </div>
            <div class="balance-breakdown">
              ${ft ? (() => {
                const fixedOpen = _openSections.has('fixed-hist-'+mk);
                const inp = `border:1.5px solid var(--border);border-radius:8px;padding:7px 9px;font-size:.83rem;font-family:inherit;color:var(--text);background:var(--bg);width:100%;outline:none`;
                const fixedRows = fixedSnap.map(f => {
                  if(_editingFixedSnap && _editingFixedSnap.mk===mk && _editingFixedSnap.id===f.id) {
                    return `<div style="padding:8px;margin:3px 0;background:var(--bg);border-radius:9px;border:1.5px solid var(--fixed);display:flex;flex-direction:column;gap:7px">
                      <div>
                        <div style="font-size:.72rem;font-weight:700;color:var(--text-2);text-transform:uppercase;letter-spacing:.05em;margin-bottom:3px">Nombre</div>
                        <input id="efsnap-name" value="${esc(f.item)}" maxlength="60" style="${inp}"/>
                      </div>
                      <div style="display:grid;grid-template-columns:1fr 1fr;gap:7px">
                        <div>
                          <div style="font-size:.72rem;font-weight:700;color:var(--text-2);text-transform:uppercase;letter-spacing:.05em;margin-bottom:3px">Monto</div>
                          <input id="efsnap-amt" type="number" value="${f.amount}" min="1" inputmode="numeric" style="${inp}"/>
                        </div>
                        <div>
                          <div style="font-size:.72rem;font-weight:700;color:var(--text-2);text-transform:uppercase;letter-spacing:.05em;margin-bottom:3px">Mes</div>
                          <input id="efsnap-month" type="month" value="${mk}" style="${inp}"/>
                        </div>
                      </div>
                      <div style="display:flex;gap:7px;justify-content:flex-end">
                        <button onclick="App.cancelEditFixedSnap()" style="padding:6px 12px;background:none;color:var(--text-2);border:1.5px solid var(--border);border-radius:7px;font-size:.75rem;font-weight:700;cursor:pointer;font-family:inherit">Cancelar</button>
                        <button onclick="App.saveEditFixedSnap('${mk}','${f.id}')" style="padding:6px 14px;background:var(--fixed);color:#fff;border:none;border-radius:7px;font-size:.75rem;font-weight:700;cursor:pointer;font-family:inherit">Guardar</button>
                      </div>
                    </div>`;
                  }
                  return `<div style="display:flex;align-items:center;gap:6px;padding:5px 0;border-bottom:1px solid var(--border)">
                    <span style="flex:1;font-size:.82rem;font-weight:600">${esc(f.item)}</span>
                    <span style="font-size:.82rem;font-weight:700;white-space:nowrap">${disp(f.amount)}</span>
                    <button class="btn-action edit" onclick="App.editFixedSnap('${mk}','${f.id}')" title="Editar">${SVG.pencil}</button>
                  </div>`;
                }).join('');
                return `<div>
                  <button onclick="App.toggleSection('fixed-hist-${mk}')" class="breakdown-row fixed-row" style="width:100%;text-align:left;border:none;cursor:pointer;background:none;padding:0;font-family:inherit">
                    <span class="br-label">Gastos fijos</span>
                    <span style="display:flex;align-items:center;gap:6px"><span class="br-val">${disp(ft)}</span><span style="font-size:.65rem;color:var(--text-2)">${fixedOpen?'▲':'▼'}</span></span>
                  </button>
                  ${fixedOpen ? `<div style="padding:4px 0 0">${fixedRows}</div>` : ''}
                </div>`;
              })() : ''}
              ${movT?`<div class="breakdown-row daily-row"><span class="br-label">Gastos del mes</span><span class="br-val">${disp(movT)}</span></div>`:''}
            </div>
            <div style="margin-top:10px">${itemRows}</div>
          </div>`;
        });
      });
    }

    // ── Papelera ──
    const trashOpen = _openSections.has('sc-trash');
    const trashCount = state.trash.length;
    if(trashCount>0) {
      const trashItems = state.trash.slice().sort((a,b)=>b.deletedAt.localeCompare(a.deletedAt)).map(t=>{
        const dDate = new Date(t.deletedAt).toLocaleDateString('es-CO',{day:'numeric',month:'short'});
        return `<div style="display:flex;align-items:center;gap:8px;padding:7px 0;border-bottom:1px solid var(--border)">
          <div style="flex:1;min-width:0">
            <span style="font-size:.82rem;font-weight:600;color:var(--text-2)">${esc(t.item)}</span>
            <span style="font-size:.7rem;color:#94a3b8;margin-left:6px">${dDate}</span>
          </div>
          <span style="font-size:.82rem;font-weight:700;color:var(--text-2)">${disp(t.amount)}</span>
          <button onclick="App.restoreMovement('${t.id}')" title="Restaurar" style="background:none;border:none;cursor:pointer;color:var(--success);font-size:.75rem;font-weight:700;padding:3px 7px;border:1.5px solid var(--success);border-radius:6px;font-family:inherit">↩ Restaurar</button>
          <button onclick="App.permanentDeleteMovement('${t.id}')" title="Eliminar definitivo" style="background:none;border:none;cursor:pointer;color:var(--danger);font-size:.75rem;font-weight:700;padding:3px 7px;border:1.5px solid var(--danger);border-radius:6px;font-family:inherit">🗑 Borrar</button>
        </div>`;
      }).join('');

      html += `<div class="sc-card" style="border:1.5px solid #fecaca">
        <button class="sc-hdr" onclick="App.toggleSection('sc-trash')" style="color:var(--danger)">
          <span>🗑 Desechados (${trashCount})</span>
          <span class="sc-arrow ${trashOpen?'open':''}">▼</span>
        </button>
        ${trashOpen?`<div class="sc-body">${trashItems}</div>`:''}
      </div>`;
    }

    return html;
  }

  // ── Collapsible section helper ────────────────────────────────────

    const open = _openSections.has(id);
    return `<div class="settings-section"><div class="sc-card">
      <button class="sc-hdr" onclick="App.toggleSection('${id}')">
        <span>${label}</span>
        <span class="sc-arrow ${open?'open':''}">▼</span>

      ${open ? `<div class="sc-body">${bodyHtml}</div>` : ''}
    </div></div>`;
  }

  // ── Compartidos ──────────────────────────────────────────────────────
  async function addShared() {
    const nameEl    = document.getElementById('sh-name');
    const totalEl   = document.getElementById('sh-total');
    const pctEl     = document.getElementById('sh-pct');
    const assignEl  = document.getElementById('sh-assign');
    const catEl     = document.getElementById('sh-cat');
    const monthEl   = document.getElementById('sh-month');
    const name      = (nameEl?.value||'').trim();
    const rawTotal  = parseFloat(totalEl?.value);
    const pct       = parseFloat(pctEl?.value);
    const cat       = catEl?.value || '';
    const monthVal  = monthEl?.value || null; // YYYY-MM o null
    const isFuture  = monthVal && monthVal > todayMk();
    // Si es mes futuro, forzar tipo mensual (los fijos no tienen mes)
    const assignedAs= isFuture ? 'monthly' : (assignEl?.value || 'fixed');
    if(!name)              { toast('Ingresa un nombre'); return; }
    if(!rawTotal||rawTotal<=0){ toast('Ingresa el monto total'); return; }
    if(!pct||pct<=0||pct>100){ toast('El porcentaje debe ser entre 1 y 100'); return; }

    let totalCLP = rawTotal, currency = 'CLP', ufTotal = null, ufRate = null;
    if (_sharedCurrency === 'UF') {
      const rate = await fetchUF();
      if(!rate){ toast('No se pudo obtener el valor UF. Intenta de nuevo.'); return; }
      totalCLP = Math.round(rawTotal * rate);
      currency = 'UF'; ufTotal = rawTotal; ufRate = rate;
    }

    const myAmount = Math.round(totalCLP * pct / 100);
    const id = 'sh'+Date.now();
    let assignedId = null;
    if(assignedAs==='fixed') {
      const fid = 'f'+Date.now();
      state.fixedExpenses.push({id:fid, item:name, amount:myAmount, category:cat});
      assignedId = fid;
    } else {
      const mk = monthVal || activeMk();
      const mid = 'm'+Date.now();
      state.movements.push({id:mid, item:name, amount:myAmount, category:cat, date:mk+'-01'});
      assignedId = mid;
    }
    state.shared.push({
      id, name, totalAmount:totalCLP, myPercent:pct, myAmount,
      assignedAs, assignedId, createdAt:new Date().toISOString(),
      currency, ufTotal, ufRate,
      ...(monthVal ? { month: monthVal } : {})
    });
    save(); render();
    const msg = currency==='UF'
      ? `"${name}" · ${rawTotal} UF = ${disp(myAmount)}`
      : `"${name}" agregado · Mi parte: ${disp(myAmount)}`;
    toast(msg);
  }

  function deleteShared(id) {
    const s = state.shared.find(s=>s.id===id);
    if(!s) return;
    // Eliminar también de fixed o movements
    if(s.assignedAs==='fixed')    state.fixedExpenses = state.fixedExpenses.filter(f=>f.id!==s.assignedId);
    else                          state.movements      = state.movements.filter(m=>m.id!==s.assignedId);
    state.shared = state.shared.filter(s=>s.id!==id);
    save(); render(); toast('Eliminado');
  }

  function forwardShared() {
    const ids = [..._selectedShared];
    if(!ids.length) { toast('Selecciona al menos un ítem'); return; }
    const nextMk = addMonths(todayMk(), 1);
    let count = 0;
    ids.forEach(id => {
      const s = state.shared.find(x=>x.id===id);
      if(!s) return;
      const mid = 'm'+Date.now()+'_'+count;
      state.movements.push({id:mid, item:s.name, amount:s.myAmount, category:'', date:nextMk+'-15'});
      state.shared.push({
        id:'sh'+Date.now()+'_'+(count+1),
        name:s.name, totalAmount:s.totalAmount, myPercent:s.myPercent, myAmount:s.myAmount,
        assignedAs:'monthly', assignedId:mid,
        createdAt:new Date().toISOString(),
        month:nextMk,
        currency:s.currency||'CLP', ufTotal:s.ufTotal||null, ufRate:s.ufRate||null
      });
      count++;
    });
    _selectedShared.clear();
    save(); render();
    toast(`${count} gasto${count>1?'s':''} traspasado${count>1?'s':''} → ${fmtMonthLabel(nextMk)}`);
  }

  function editShared(id) {
    _editingShared = id;
    const el = document.getElementById('main-content');
    if(el) el.innerHTML = renderCompartidos();
  }

  function saveEditShared(id) {
    const s = state.shared.find(x=>x.id===id);
    if(!s) return;
    const nameEl  = document.getElementById('sh-edit-name');
    const totalEl = document.getElementById('sh-edit-total');
    const pctEl   = document.getElementById('sh-edit-pct');
    const monthEl = document.getElementById('sh-edit-month');
    const name    = (nameEl?.value||'').trim();
    const total   = parseFloat(totalEl?.value);
    const pct     = parseFloat(pctEl?.value);
    const month   = monthEl?.value || null;
    if(!name)            { toast('Nombre requerido'); return; }
    if(!total||total<=0) { toast('Monto requerido'); return; }
    if(!pct||pct<=0||pct>100){ toast('% entre 1 y 100'); return; }
    const myAmount = Math.round(total * pct / 100);
    // Actualizar movimiento vinculado si existe
    const mov = state.movements.find(m=>m.id===s.assignedId);
    if(mov) { mov.item = name; mov.amount = myAmount; if(month) mov.date = month+'-01'; }
    const fix = state.fixedExpenses.find(f=>f.id===s.assignedId);
    if(fix) { fix.item = name; fix.amount = myAmount; }
    // Actualizar shared
    s.name = name; s.totalAmount = total; s.myPercent = pct; s.myAmount = myAmount;
    if(month) s.month = month; else delete s.month;
    _editingShared = null;
    save(); render(); toast('Actualizado ✓');
  }

  function cancelEditShared() {
    _editingShared = null;
    const el = document.getElementById('main-content');
    if(el) el.innerHTML = renderCompartidos();
  }

  function toggleSharedSelect(id) {
    if(_selectedShared.has(id)) _selectedShared.delete(id);
    else _selectedShared.add(id);
    // re-render solo la sección de lista para no perder el formulario
    const el = document.getElementById('main-content');
    if(el) { el.innerHTML = renderCompartidos(); }
  }

  function generateGroupCode() {
    const ids = [..._selectedShared];
    if(!ids.length) { toast('Selecciona al menos un ítem'); return; }
    const items = ids.map(id => {
      const s = state.shared.find(x=>x.id===id);
      if(!s) return null;
      const theirPct = Math.round(100 - s.myPercent);
      const theirAmt = Math.round(s.totalAmount * theirPct / 100);
      return {
        name: s.name, total: s.totalAmount, pct: theirPct, amt: theirAmt,
        ...(s.currency==='UF' && s.ufTotal ? {
          currency:'UF', ufTotal:s.ufTotal, ufRate:s.ufRate,
          ufAmt: Math.round(s.ufTotal * theirPct / 100 * 100) / 100
        } : {})
      };
    }).filter(Boolean);
    const code = btoa(unescape(encodeURIComponent(JSON.stringify({v:2, items}))));
    _showGroupModal(code, items.length);
  }

  function _showGroupModal(code, count) {
    const existing = document.getElementById('group-code-modal');
    if(existing) existing.remove();
    const waText = encodeURIComponent('Código MiGasto ('+count+' gasto'+(count>1?'s':'')+'):\n'+code);
    const waUrl = 'https://wa.me/?text='+waText;
    const modal = document.createElement('div');
    modal.id = 'group-code-modal';
    modal.style.cssText = 'position:fixed;inset:0;background:rgba(0,0,0,.55);z-index:9999;display:flex;align-items:flex-end;justify-content:center';
    modal.innerHTML = `
      <div style="background:var(--card);width:100%;max-width:480px;border-radius:20px 20px 0 0;padding:24px 20px 32px;display:flex;flex-direction:column;gap:14px">
        <div style="display:flex;justify-content:space-between;align-items:center">
          <span style="font-weight:800;font-size:1rem;color:var(--text)">📦 Código grupal (${count} ítem${count>1?'s':''})</span>
          <button onclick="document.getElementById('group-code-modal').remove()" style="background:none;border:none;font-size:1.3rem;cursor:pointer;color:var(--text-2)">✕</button>
        </div>
        <textarea readonly onclick="this.select()" style="width:100%;height:80px;border:1.5px solid var(--border);border-radius:10px;padding:10px;font-size:.72rem;font-family:monospace;background:var(--bg);color:var(--text);resize:none">${code}</textarea>
        <button onclick="navigator.clipboard&&navigator.clipboard.writeText('${code.replace(/'/g,"\\'")}').then(()=>{App._toast('Código copiado ✓');document.getElementById('group-code-modal').remove()}).catch(()=>{})" style="width:100%;padding:13px;background:var(--brand);color:#fff;border:none;border-radius:10px;font-size:.95rem;font-weight:700;cursor:pointer;font-family:inherit">📋 Copiar código</button>
        <a href="${waUrl}" target="_blank" style="display:block;width:100%;padding:13px;background:#25d366;color:#fff;border:none;border-radius:10px;font-size:.95rem;font-weight:700;cursor:pointer;font-family:inherit;text-align:center;text-decoration:none">💬 Enviar por WhatsApp</a>
      </div>`;
    document.body.appendChild(modal);
    modal.addEventListener('click', e=>{ if(e.target===modal) modal.remove(); });
  }

  function generateShareCode(id) {
    const s = state.shared.find(s=>s.id===id);
    if(!s) return;
    const theirPct = Math.round(100 - s.myPercent);
    const theirAmt = Math.round(s.totalAmount * theirPct / 100);
    const payload = {
      v:1, name:s.name, total:s.totalAmount, pct:theirPct, amt:theirAmt,
      ...(s.currency==='UF' && s.ufTotal ? {
        currency:'UF', ufTotal:s.ufTotal, ufRate:s.ufRate,
        ufAmt: Math.round(s.ufTotal * theirPct / 100 * 100) / 100
      } : {})
    };
    const code = btoa(unescape(encodeURIComponent(JSON.stringify(payload))));
    // Copiar al portapapeles
    if(navigator.clipboard) {
      navigator.clipboard.writeText(code).then(()=>toast('Código copiado — pégalo en WhatsApp ✓')).catch(()=>_showCode(code));
    } else { _showCode(code); }
  }

  function _showCode(code) {
    const el = document.getElementById('sh-code-out');
    if(el){ el.value=code; el.select(); toast('Selecciona el código y cópialo'); }
  }

  function importSharedCode() {
    const el = document.getElementById('sh-import-input');
    const raw = (el?.value||'').trim();
    if(!raw){ toast('Pega un código primero'); return; }
    try {
      const payload = JSON.parse(decodeURIComponent(escape(atob(raw))));
      if(!payload.v){ toast('Código inválido'); return; }

      // ── v:2 — código grupal (múltiples ítems) ─────────────────────
      if(payload.v===2 && Array.isArray(payload.items)) {
        if(!payload.items.length){ toast('El código no contiene ítems'); return; }
        // Importar todos automáticamente como shared
        let importados = 0;
        for(const it of payload.items) {
          if(!it.name||!it.total) continue;
          const isUF = it.currency==='UF' && it.ufTotal;
          if(isUF && it.ufRate) _ufCache = { rate: it.ufRate, date: new Date().toISOString().slice(0,10) };
          const myAmt = isUF ? Math.round(it.ufAmt * (it.ufRate||0)) : it.amt;
          const mid = 'm'+Date.now()+'_imp'+importados;
          state.movements.push({id:mid, item:it.name, amount:myAmt, category:'', date:todayMk()+'-15'});
          state.shared.push({
            id:'sh'+Date.now()+'_imp'+importados,
            name: it.name,
            totalAmount: it.total,
            myPercent: it.pct,
            myAmount: myAmt,
            assignedAs: 'monthly',
            assignedId: mid,
            createdAt: new Date().toISOString(),
            ...(isUF ? { currency:'UF', ufTotal:it.ufTotal, ufRate:it.ufRate } : {})
          });
          importados++;
        }
        save();
        if(document.getElementById('sh-import-input')) document.getElementById('sh-import-input').value='';
        toast(`${importados} gasto${importados>1?'s':''} importado${importados>1?'s':''} ✓ — revisa y ajusta si necesitas`);
        render();
        return;
      }

      if(!payload.name||!payload.total){ toast('Código inválido'); return; }
      const isUFPayload = payload.currency === 'UF' && payload.ufTotal;
      // Activar modo UF si corresponde (re-renderiza el form)
      if(isUFPayload && _sharedCurrency !== 'UF') {
        _sharedCurrency = 'UF';
        if(payload.ufRate) _ufCache = { rate: payload.ufRate, date: new Date().toISOString().slice(0,10) };
        render();
      } else if(!isUFPayload && _sharedCurrency !== 'CLP') {
        _sharedCurrency = 'CLP';
        render();
      }
      // Pre-llenar el formulario
      const nameEl  = document.getElementById('sh-name');
      const totalEl = document.getElementById('sh-total');
      const pctEl   = document.getElementById('sh-pct');
      const myAmt   = document.getElementById('sh-myamt');
      if(nameEl)  nameEl.value  = payload.name;
      if(totalEl) totalEl.value = isUFPayload ? payload.ufTotal : payload.total;
      if(pctEl)   pctEl.value   = payload.pct;
      if(myAmt) {
        if(isUFPayload && payload.ufAmt) {
          const clpAmt = Math.round(payload.ufAmt * (payload.ufRate||0));
          myAmt.innerHTML = `${payload.ufAmt} UF <span style="font-size:.72rem;color:var(--text-2);font-weight:600">≈ ${disp(clpAmt)}</span>`;
        } else {
          myAmt.textContent = disp(payload.amt);
        }
      }
      if(el) el.value = '';
      const ufMsg = isUFPayload ? ` · ${payload.ufAmt} UF ≈ ${disp(Math.round(payload.ufAmt*(payload.ufRate||0)))}` : '';
      toast(`"${payload.name}" importado${ufMsg} — revisa y guarda`);
    } catch { toast('Código inválido o corrupto'); }
  }

  function updateMyAmount() {
    const total = parseFloat(document.getElementById('sh-total')?.value||0);
    const pct   = parseFloat(document.getElementById('sh-pct')?.value||0);
    const el    = document.getElementById('sh-myamt');
    if(!el) return;
    if(!(total>0&&pct>0)){ el.innerHTML='—'; return; }
    if(_sharedCurrency==='UF' && _ufCache) {
      const myUF  = Math.round(total * pct / 100 * 100) / 100;
      const myCLP = Math.round(myUF * _ufCache.rate);
      el.innerHTML = `${myUF} UF <span style="font-size:.72rem;color:var(--text-2);font-weight:600">≈ ${disp(myCLP)}</span>`;
    } else {
      el.textContent = disp(Math.round(total*pct/100));
    }
  }

    }

    return `

          <div style="display:flex;flex-direction:column;gap:10px">
            <div><label>Nombre del gasto</label>
              <input type="text" id="sh-name" placeholder="Ej: Arriendo, Netflix..." maxlength="60" autocorrect="off" spellcheck="false"/></div>

              </div>
              <input type="number" id="sh-total" placeholder="${isUF?'Ej: 12.5':'Ej: 1000000'}" min="0" step="any" inputmode="decimal" oninput="App.updateMyAmount()"/>
            </div>
            <div><label>Mi porcentaje (%)</label>
              <input type="number" id="sh-pct" placeholder="Ej: 50" min="1" max="100" step="any" inputmode="decimal" oninput="App.updateMyAmount()"/></div>
            <div style="background:var(--bg);border-radius:10px;padding:10px 14px;display:flex;justify-content:space-between;align-items:center">
              <span style="font-size:.82rem;color:var(--text-2);font-weight:600">Mi parte a pagar</span>
              <span id="sh-myamt" style="font-size:1.1rem;font-weight:800;color:#0891b2">—</span>
            </div>
            <div><label>Asignar como</label>
              <select id="sh-assign" class="cat-select">
                <option value="fixed">Gasto Fijo (mensual recurrente)</option>
                <option value="monthly">Gasto del mes (único)</option>
              </select></div>
            <div>
              <label>¿En qué mes cae? <span style="font-weight:400;color:var(--text-2)">(opcional — vacío = mes actual)</span></label>
              <input type="month" id="sh-month" min="${nowMk}" style="width:100%;padding:10px 12px;border:1.5px solid var(--border);border-radius:10px;font-size:.9rem;background:var(--card);color:var(--text);font-family:inherit"/>
            </div>
            <div><label>Categoría</label>
              <select id="sh-cat" class="cat-select"><option value="">Sin categoría</option>${catOpts}</select></div>
            <button onclick="App.addShared()" style="width:100%;padding:13px;background:#0891b2;color:#fff;border:none;border-radius:10px;font-size:.95rem;font-weight:700;cursor:pointer;font-family:inherit">+ Agregar gasto compartido</button>
          </div>
        </div>
      </div>

      <div style="padding:12px 16px 0">
        <div class="sc-card" style="border:1.5px solid #bae6fd">

            <p style="font-size:.72rem;font-weight:700;color:#0891b2;text-transform:uppercase;letter-spacing:.06em;margin-bottom:8px">📥 Importar código de otro usuario</p>
            <textarea id="sh-import-input" rows="2" placeholder="Pega aquí el código que te enviaron..." style="width:100%;border:1.5px solid var(--border);border-radius:8px;padding:9px 11px;font-size:.82rem;font-family:inherit;background:var(--card);color:var(--text);resize:none"></textarea>
            <button onclick="App.importSharedCode()" style="width:100%;margin-top:8px;padding:10px;background:#ecfeff;color:#0891b2;border:1.5px solid #0891b2;border-radius:8px;font-size:.85rem;font-weight:700;cursor:pointer;font-family:inherit">Importar y pre-llenar formulario</button>
          </div>

      </div>

      <div style="padding:12px 16px 24px">
        <p style="font-size:.68rem;font-weight:700;color:var(--text-2);text-transform:uppercase;letter-spacing:.06em;margin-bottom:8px">Mis gastos compartidos (${currentItems.length})</p>
        ${groupBar}
        ${currentList}
        ${futureSection}
      </div>

      <textarea id="sh-code-out" style="position:absolute;left:-9999px;top:0" readonly></textarea>
    `;
  }

  // ── Bind forms ────────────────────────────────────────────────────
  function bindForms() {
    const df=document.getElementById('expense-form');
    if(df) df.addEventListener('submit', e=>{
      e.preventDefault();
      const item=document.getElementById('input-item').value.trim();
      const amt=parseFloat(document.getElementById('input-amount').value);
      const cat=document.getElementById('input-cat')?.value||'';
      if(!item||!amt||amt<=0) return;
      const pm = _paymentMethod;
      const cuotasEl = document.getElementById('input-cuotas');
      const cuotas = cuotasEl ? Math.max(1, parseInt(cuotasEl.value)||1) : 1;
      const btn=document.getElementById('btn-save');
      btn.textContent='¡Guardado!'; btn.classList.add('saved');
      setTimeout(()=>{btn.textContent='Guardar movimiento';btn.classList.remove('saved');},1200);
      addMovement(item,amt,cat,pm,cuotas);
      document.getElementById('input-item').value='';
      document.getElementById('input-amount').value='';
      document.getElementById('input-item').focus();
      if(pm==='tc'&&cuotas>1) toast(`${item} — ${cuotas} cuotas de ${fmt(Math.round(amt/cuotas))}`);
      else toast(`${item} — ${fmt(amt)}`);
    });

    const ff=document.getElementById('fixed-form');
    if(ff) ff.addEventListener('submit', async e=>{
      e.preventDefault();
      const item=document.getElementById('input-fixed-item').value.trim();
      const rawAmt=parseFloat(document.getElementById('input-fixed-amount').value);
      const cat=document.getElementById('input-fixed-cat')?.value||'';
      if(!item||!rawAmt||rawAmt<=0) return;
      let finalAmt=rawAmt, currency='CLP', ufAmount=null, ufRate=null;
      if(_fixedCurrency==='UF'){
        const rate=await fetchUF();
        if(!rate){ toast('No se pudo obtener el valor UF. Intenta de nuevo.'); return; }
        finalAmt=Math.round(rawAmt*rate);
        currency='UF'; ufAmount=rawAmt; ufRate=rate;
        toast(`${rawAmt} UF = ${fmt(finalAmt)}`);
      }
      if(!addFixed(item,finalAmt,cat,currency,ufAmount,ufRate)) return;
      const btn=document.getElementById('btn-save-fixed');
      btn.textContent='Agregado ✓'; btn.classList.add('saved');
      setTimeout(()=>{btn.textContent='+ Agregar gasto fijo';btn.classList.remove('saved');},1200);
      document.getElementById('input-fixed-item').value='';
      document.getElementById('input-fixed-amount').value='';
      document.getElementById('input-fixed-item').focus();
      if(currency==='CLP') toast(`${item} — ${fmt(finalAmt)}`);
    });

    const si=document.getElementById('settings-income');
    if(si) si.addEventListener('keydown', e=>{ if(e.key==='Enter') saveSettingsInline(); });
    const su=document.getElementById('settings-username');
    if(su) su.addEventListener('keydown', e=>{ if(e.key==='Enter') saveUsername(); });
  }

  // ── Captura rápida (Share Target + Shortcut) ─────────────────────
  function _parseAmount(text) {
    if(!text) return null;
    // Patrones: $15.000 | $ 15000 | CLP 15.000 | 15000 pesos | 15.000 CLP
    const patterns = [
      /\$\s*([\d.,]+)/,
      /CLP\s*([\d.,]+)/i,
      /([\d.,]+)\s*(?:pesos?|clp)/i,
      /monto[:\s]+([\d.,]+)/i,
      /total[:\s]+([\d.,]+)/i,
      /pagaste?\s*\$?\s*([\d.,]+)/i,
      /compra[:\s]+\$?\s*([\d.,]+)/i,
    ];
    for(const p of patterns) {
      const m = text.match(p);
      if(m) {
        const raw = m[1].replace(/\./g,'').replace(',','.');
        const n = parseFloat(raw);
        if(n > 0) return Math.round(n);
      }
    }
    return null;
  }

  function _parseDescription(text) {
    if(!text) return '';
    // Intentar extraer comercio/descripción del texto
    const patterns = [
      /en\s+([A-ZÁÉÍÓÚa-záéíóú][^\n$\d]{2,30})/,
      /comercio[:\s]+([^\n$\d]{2,30})/i,
      /([A-ZÁÉÍÓÚ][A-Za-záéíóú\s]{2,20})(?:\s*\$)/,
    ];
    for(const p of patterns) {
      const m = text.match(p);
      if(m) return m[1].trim();
    }
    return '';
  }

  function openQuickCapture(sharedText) {
    const existing = document.getElementById('quick-capture-modal');
    if(existing) existing.remove();

    const amount  = _parseAmount(sharedText);
    const desc    = _parseDescription(sharedText);

    const modal = document.createElement('div');
    modal.id = 'quick-capture-modal';
    modal.style.cssText = 'position:fixed;inset:0;background:rgba(0,0,0,.6);z-index:9999;display:flex;align-items:flex-end;justify-content:center';
    modal.innerHTML = `
      <div style="background:var(--card);width:100%;max-width:480px;border-radius:24px 24px 0 0;padding:24px 20px 40px;display:flex;flex-direction:column;gap:14px">
        <div style="display:flex;justify-content:space-between;align-items:center">
          <div>
            <div style="font-weight:800;font-size:1.1rem;color:var(--text)">⚡ Gasto rápido</div>
            ${sharedText ? `<div style="font-size:.72rem;color:var(--text-2);margin-top:2px">Detectado desde notificación</div>` : ''}
          </div>
          <button onclick="document.getElementById('quick-capture-modal').remove()" style="background:none;border:none;font-size:1.4rem;cursor:pointer;color:var(--text-2);min-width:36px;min-height:36px">✕</button>
        </div>
        ${sharedText ? `<div style="background:var(--bg);border-radius:10px;padding:10px 12px;font-size:.78rem;color:var(--text-2);max-height:60px;overflow:hidden;text-overflow:ellipsis">${sharedText.slice(0,120)}${sharedText.length>120?'…':''}</div>` : ''}
        <div>
          <label style="font-size:.72rem;font-weight:700;color:var(--text-2);text-transform:uppercase;letter-spacing:.05em;display:block;margin-bottom:5px">¿En qué gastaste?</label>
          <input id="qc-item" type="text" value="${esc(desc)}" placeholder="Ej: Almuerzo, Metro, Café..." maxlength="60"
            style="width:100%;padding:12px 14px;border:1.5px solid var(--border);border-radius:12px;font-size:1rem;font-family:inherit;background:var(--bg);color:var(--text)"/>
        </div>
        <div>
          <label style="font-size:.72rem;font-weight:700;color:var(--text-2);text-transform:uppercase;letter-spacing:.05em;display:block;margin-bottom:5px">¿Cuánto?</label>
          <input id="qc-amount" type="number" value="${amount||''}" placeholder="Ej: 6000" inputmode="numeric" min="1"
            style="width:100%;padding:12px 14px;border:1.5px solid ${amount?'var(--brand)':'var(--border)'};border-radius:12px;font-size:1.2rem;font-weight:700;font-family:inherit;background:var(--bg);color:var(--text)"/>
          ${amount ? `<div style="font-size:.72rem;color:var(--brand);margin-top:4px;font-weight:600">✓ Monto detectado automáticamente</div>` : ''}
        </div>
        <button onclick="App.saveQuickCapture()" style="width:100%;padding:14px;background:var(--brand);color:#fff;border:none;border-radius:12px;font-size:1rem;font-weight:800;cursor:pointer;font-family:inherit;margin-top:4px">
          Guardar gasto
        </button>
      </div>`;
    document.body.appendChild(modal);
    modal.addEventListener('click', e=>{ if(e.target===modal) modal.remove(); });
    // Focus en el campo correcto
    setTimeout(()=>{
      const el = amount
        ? document.getElementById('qc-item')
        : document.getElementById('qc-amount');
      if(el) el.focus();
    }, 150);
  }

  function saveQuickCapture() {
    const item = (document.getElementById('qc-item')?.value||'').trim();
    const amt  = parseFloat(document.getElementById('qc-amount')?.value||0);
    if(!amt||amt<=0) { toast('Ingresa el monto'); return; }
    const name = item || 'Gasto rápido';
    state.movements.push({
      id: 'm'+Date.now(),
      item: name,
      amount: Math.round(amt),
      category: '',
      date: new Date().toISOString(),
      paymentMethod: 'cash'
    });
    save();
    document.getElementById('quick-capture-modal')?.remove();
    toast(`"${name}" guardado — ${fmt(Math.round(amt))}`);
    if(state.tab === 'daily') render();
  }

  // ── Init ──────────────────────────────────────────────────────────
  function init() {
    load(); render();
    document.getElementById('btn-eye').addEventListener('click', toggleAmounts);
    document.getElementById('modal-settings').addEventListener('click', e=>{ if(e.target===e.currentTarget) closeSettings(); });
    document.getElementById('income-input').addEventListener('keydown', e=>{ if(e.key==='Enter') saveSettings(); });
    if('serviceWorker' in navigator) navigator.serviceWorker.register('sw.js', {updateViaCache:'none'}).catch(()=>{});

    // Detectar Share Target o shortcut ?quick=1
    const params = new URLSearchParams(window.location.search);
    const sharedText  = params.get('text') || params.get('title') || '';
    const isQuick     = params.get('quick') === '1';
    if(sharedText || isQuick) {
      // Limpiar URL sin recargar
      window.history.replaceState({}, '', window.location.pathname);
      setTimeout(() => openQuickCapture(sharedText), 400);
    }
  }

  function doUpdate() {
    if(!window._swWaiting) return;
    const banner = document.getElementById('update-banner');
    if(banner) banner.style.display = 'none';
    window._swWaiting.postMessage({ type:'SKIP_WAITING' });
    navigator.serviceWorker.addEventListener('controllerchange', ()=>location.reload());
  }

  async function forceRefresh() {
    const btn = document.getElementById('btn-refresh');
    if(btn) { btn.textContent = '⏳'; btn.style.opacity = '0.6'; btn.disabled = true; }
    try {
      // 1. Borrar todos los cachés
      if('caches' in window) {
        const keys = await caches.keys();
        await Promise.all(keys.map(k => caches.delete(k)));
      }
      // 2. Activar SW en espera si hay uno
      if(window._swWaiting) {
        window._swWaiting.postMessage({ type:'SKIP_WAITING' });
        await new Promise(r => setTimeout(r, 300));
      }
      // 3. Desregistrar SW
      if(navigator.serviceWorker) {
        const regs = await navigator.serviceWorker.getRegistrations();
        await Promise.all(regs.map(r => r.unregister()));
        await new Promise(r => setTimeout(r, 200));
      }
    } catch(e) {}
    // 4. Recargar con parámetro único para evitar caché del navegador
    window.location.href = window.location.pathname + '?v=' + Date.now();
  }
  function refreshIfSettings() {
    if(state.tab==='settings') render();
  }

  return {
    init, setTab, setGastosMode, openSettings, closeSettings, saveSettings,
    deleteMovement, deleteFixed, fillFixedItem, toggleSuggestions, deleteSuggestion,
    addSavingUI, deleteSaving, addIncomeItemUI, deleteIncomeItem,
    saveSettingsInline, saveUsername, goMonth,
    doUpdate, forceRefresh, refreshIfSettings,
    openQuickCapture, saveQuickCapture,
    addSavingsCatUI, deleteSavingsCat,
    toggleSection,
    addMovCatUI, deleteMovCat, addFixedCatUI, deleteFixedCat,
    setFixedCurrency, jumpToMonth,
    addProjectUI, deleteProject,
    editFixedSnap, saveEditFixedSnap, cancelEditFixedSnap,
    editMovement, saveEditMovement, cancelEditMovement,
    permanentDeleteMovement, restoreMovement,
    toggleDark,
    addShared, deleteShared, generateShareCode, importSharedCode, updateMyAmount, setSharedCurrency,
    toggleSharedSelect, generateGroupCode, forwardShared,
    editShared, saveEditShared, cancelEditShared,
    clearSharedSelect: ()=>{ _selectedShared.clear(); const el=document.getElementById('main-content'); if(el) el.innerHTML=renderCompartidos(); },
    _toast: toast,
    addMonths, setPaymentMethod,
    editFixed, saveEditFixed, cancelEditFixed,
    editSaving, saveEditSaving, cancelEditSaving,
    editProject, saveEditProject, cancelEditProject
  };
})();

// ══ ARRANQUE DE LA APP ═══════════════════════════════════════════════
App.init();

// ══ SERVICE WORKER — DETECCIÓN DE ACTUALIZACIÓN ═══════════════════════
window._swWaiting = null;

if ('serviceWorker' in navigator) {
  navigator.serviceWorker.getRegistration().then(reg=>{
    if(!reg) return;
    if(reg.waiting) _markUpdate(reg.waiting);
    // Forzar chequeo de actualización cada vez que se abre la app
    reg.update();
    reg.addEventListener('updatefound', ()=>{
      const newSW = reg.installing;
      newSW.addEventListener('statechange', ()=>{
        if(newSW.state==='installed' && navigator.serviceWorker.controller) _markUpdate(newSW);
      });
    });
  });

  function _markUpdate(sw) {
    window._swWaiting = sw;
    const banner = document.getElementById('update-banner');
    if(banner) banner.style.display = 'flex';
    try { if(App && typeof App.refreshIfSettings==='function') App.refreshIfSettings(); } catch {}
  }
}
</script>
